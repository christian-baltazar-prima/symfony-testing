name: Test Coverage

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base ref
        id: base_ref
        shell: bash
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            echo "base_ref=${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=master" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch base ref
        shell: bash
        run: |
          git fetch --no-tags origin \
            "+refs/heads/${{ steps.base_ref.outputs.base_ref }}:refs/remotes/origin/${{ steps.base_ref.outputs.base_ref }}"

      - name: Prepare directories
        run: mkdir -p build/logs build/coverage

      - name: Start services
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Run tests with coverage in app container
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e APP_ENV=test \
            -e DATABASE_URL='mysql://root:root@db:3306/symfony-test?serverVersion=8.0&charset=utf8mb4' \
            -e XDEBUG_MODE=coverage \
            app sh -lc '
              git config --global --add safe.directory /var/www/html &&
              COMPOSER_ALLOW_SUPERUSER=1 composer install --no-interaction --prefer-dist &&
              php ./vendor/bin/phpunit \
                --configuration phpunit.dist.xml \
                --coverage-clover build/logs/clover.xml \
                --coverage-html build/coverage
            '

      - name: Stop compose services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down --volumes --remove-orphans

      - name: Parse coverage metrics
        id: coverage
        shell: bash
        run: |
          php .github/scripts/coverage-compare.php total build/logs/clover.xml >> $GITHUB_OUTPUT

      - name: Parse changed-code coverage
        id: coverage_changed
        shell: bash
        continue-on-error: true
        run: |
          if [ -f build/logs/clover.xml ]; then
            php .github/scripts/coverage-compare.php changed build/logs/clover.xml "origin/${{ steps.base_ref.outputs.base_ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Write job summary
        run: |
          {
            echo "## PHPUnit Coverage";
            echo "";
            echo "| Metric | Value |";
            echo "| --- | ---: |";
            echo "| Line coverage | ${{ steps.coverage.outputs.line_coverage }}% |";
            echo "| Covered lines | ${{ steps.coverage.outputs.covered_lines }} / ${{ steps.coverage.outputs.total_lines }} |";
            echo "| Method coverage | ${{ steps.coverage.outputs.method_coverage }}% |";
            echo "| Covered methods | ${{ steps.coverage.outputs.covered_methods }} / ${{ steps.coverage.outputs.total_methods }} |";
            echo "";
            echo "HTML report is available in the \`coverage-html-report\` artifact.";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- coverage-report-comment -->";
            const sections = [];
            const fullCoverageLines = [
              "### Full Project Coverage",
              "",
              "| Metric | Value |",
              "| --- | ---: |",
              "| Line coverage | ${{ steps.coverage.outputs.line_coverage }}% |",
              "| Covered lines | ${{ steps.coverage.outputs.covered_lines }} / ${{ steps.coverage.outputs.total_lines }} |",
              "| Method coverage | ${{ steps.coverage.outputs.method_coverage }}% |",
              "| Covered methods | ${{ steps.coverage.outputs.covered_methods }} / ${{ steps.coverage.outputs.total_methods }} |"
            ];
            sections.push(fullCoverageLines.join("\n"));

            const changedLineCoverage = '${{ steps.coverage_changed.outputs.line_coverage }}';
            if (changedLineCoverage && changedLineCoverage !== '' && !changedLineCoverage.includes('undefined')) {
              const changedCoverageLines = [
                "### Coverage for Changed Code",
                "",
                "| Metric | Value |",
                "| --- | ---: |",
                "| Line coverage | ${{ steps.coverage_changed.outputs.line_coverage }}% |",
                "| Covered lines | ${{ steps.coverage_changed.outputs.covered_lines }} / ${{ steps.coverage_changed.outputs.total_lines }} |",
                "| Method coverage | ${{ steps.coverage_changed.outputs.method_coverage }}% |",
                "| Covered methods | ${{ steps.coverage_changed.outputs.covered_methods }} / ${{ steps.coverage_changed.outputs.total_methods }} |"
              ];
              sections.push(changedCoverageLines.join("\n"));
            }

            sections.push([
              "### Artifacts",
              "HTML report is available in the `coverage-html-report` artifact from this workflow run."
            ].join("\n"));

            const body = [
              marker,
              "## PHPUnit Coverage",
              "",
              sections.join("\n\n")
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: build/coverage
          retention-days: 7
